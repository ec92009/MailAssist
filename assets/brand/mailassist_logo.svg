<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">MailAssist logo</title>
  <desc id="desc">A warm green rounded square with a cream envelope and a friendly MailAssist wordmark.</desc>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B8B69"/>
      <stop offset="1" stop-color="#07523F"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF9EF"/>
      <stop offset="1" stop-color="#F4DEC2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#12352C" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="960" height="280" fill="#F7EFE6"/>
  <g transform="translate(48 34)" filter="url(#shadow)">
    <rect width="212" height="212" rx="54" fill="url(#tile)"/>
    <path d="M55 72h102c13 0 23 10 23 23v48c0 13-10 23-23 23H55c-13 0-23-10-23-23V95c0-13 10-23 23-23Z" fill="url(#paper)"/>
    <path d="M43 89l63 45 63-45" fill="none" stroke="#0A6C52" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M44 157l48-39m76 39-48-39" fill="none" stroke="#0A6C52" stroke-width="8" stroke-linecap="round"/>
    <circle cx="160" cy="52" r="11" fill="#FFF9EF"/>
    <path d="M176 40v24M164 52h24" stroke="#FFF9EF" stroke-width="7" stroke-linecap="round"/>
  </g>
  <g transform="translate(304 75)">
    <text x="0" y="78" font-family="Avenir Next, Avenir, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#1D2430">MailAssist</text>
    <text x="4" y="126" font-family="Avenir Next, Avenir, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#6B7A8D">Local draft help, under your control.</text>
    <rect x="4" y="151" width="280" height="10" rx="5" fill="#0B8B69"/>
    <rect x="300" y="151" width="76" height="10" rx="5" fill="#D7B18B"/>
  </g>
